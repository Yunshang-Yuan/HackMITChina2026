<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMEBANK | AUTH_NODE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="l.css"> 
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; position: relative;">

    <button class="btn btn-brut position-absolute top-0 end-0 m-4 px-3" id="btn-theme-toggle" title="TOGGLE THEME" style="z-index: 1050;">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <div class="brut-card p-4 p-md-5" style="width: 100%; max-width: 480px; position: relative; z-index: 10;">
        
        <div class="mb-4 border-bottom pb-3" style="border-bottom: 4px solid var(--brut-black) !important;">
            <span class="badge-brut mb-2 d-inline-block">SYS.TIMEBANK</span>
            <h2 class="fw-black m-0 font-monospace" style="letter-spacing: -1px;">AUTHENTICATION</h2>
            <p class="font-monospace small fw-bold mt-2 mb-0" style="color: var(--brut-red);">// 让每一次志愿服务都有迹可循</p>
        </div>

        <ul class="nav nav-pills nav-justified mb-4" id="loginTabs" role="tablist">
            <li class="nav-item pe-2" role="presentation">
                <button class="nav-link active w-100" id="tab-login" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">LOGIN // 登录</button>
            </li>
            <li class="nav-item ps-2" role="presentation">
                <button class="nav-link w-100" id="tab-register" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">REGISTER // 注册</button>
            </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
            
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label font-monospace fw-bold small">USER_ID [邮箱地址]</label>
                        <input type="email" class="form-control brut-input" id="login-email" placeholder="INPUT EMAIL..." required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label font-monospace fw-bold small">ACCESS_KEY [登录密码]</label>
                        <input type="password" class="form-control brut-input" id="login-password" placeholder="INPUT PASSWORD..." required>
                    </div>
                    <button type="button" class="btn btn-brut btn-brut-red w-100 py-2 fs-5" id="btn-do-login">
                        EXECUTE LOGIN <i class="bi bi-caret-right-fill"></i>
                    </button>
                </form>
            </div>

            <div class="tab-pane fade" id="pills-register" role="tabpanel">
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label font-monospace fw-bold small">NEW_USER_ID [邮箱地址]</label>
                        <input type="email" class="form-control brut-input" id="reg-email" placeholder="SCHOOL EMAIL RECOMMENDED" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-monospace fw-bold small">SET_ACCESS_KEY [设置密码]</label>
                        <input type="password" class="form-control brut-input" id="reg-password" placeholder="MIN 6 CHARS" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label font-monospace fw-bold small">SYS_ROLE [选择身份]</label>
                        <select class="form-select brut-input" id="reg-role">
                            <option value="student" selected>STUDENT (学生)</option>
                            <option value="teacher">TEACHER (老师)</option>
                            <option value="admin">ADMIN (审核员)</option>
                        </select>
                        <div class="font-monospace small fw-bold mt-2" style="color: var(--brut-red);">
                            * V1 TEST: ALL ROLES OPEN
                        </div>
                    </div>
                    <button type="button" class="btn btn-brut w-100 py-2 fs-5" id="btn-do-register" style="background-color: var(--brut-black); color: var(--brut-white);">
                        CREATE NODE <i class="bi bi-plus-square-fill ms-2"></i>
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="l.js"></script>
</body>
</html>
