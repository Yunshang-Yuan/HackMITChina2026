<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间银行 - 身份验证</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="l.css">
</head>
<body>
    <i class="bi bi-moon-stars-fill theme-toggle" id="themeSwitcher" title="切换深浅色"></i>

    <div class="card login-card p-4 p-md-5 animate-up">
        
        <div class="text-center mb-4 animate-up delay-1">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 70px; height: 70px;">
                <i class="bi bi-bank" style="font-size: 2.5rem;"></i>
            </div>
            <h3 class="fw-bold mb-1">时间银行</h3>
            <p class="text-secondary small mb-0">让每一次志愿服务都有迹可循</p>
        </div>

        <ul class="nav nav-pills nav-justified mb-4 animate-up delay-2" id="loginTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active rounded-pill fw-bold" id="tab-login" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">登录</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link rounded-pill fw-bold" id="tab-register" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">注册</button>
            </li>
        </ul>

        <div class="tab-content animate-up delay-3" id="pills-tabContent">
            
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">邮箱地址</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0 bg-transparent" id="login-email" placeholder="输入注册邮箱" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold">登录密码</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-shield-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0 bg-transparent" id="login-password" placeholder="输入密码" required>
                        </div>
                    </div>
                    <button type="button" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm" id="btn-do-login">
                        立即登录 <i class="bi bi-arrow-right-short fs-5 align-middle"></i>
                    </button>
                </form>
            </div>

            <div class="tab-pane fade" id="pills-register" role="tabpanel">
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">邮箱地址</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0 bg-transparent" id="reg-email" placeholder="建议使用学校邮箱" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">设置密码</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-key text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0 bg-transparent" id="reg-password" placeholder="至少6位" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold">选择身份</label>
                        <select class="form-select bg-transparent" id="reg-role">
                            <option value="student" selected>👨‍🎓 学生 (Student)</option>
                            <option value="teacher">👨‍🏫 老师 (Teacher)</option>
                            <option value="admin">🛡️ 审核员 (Admin)</option>
                        </select>
                        <div class="form-text small text-danger mt-2">
                            <i class="bi bi-info-circle"></i> V1 测试阶段开放全角色注册。
                        </div>
                    </div>
                    <button type="button" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm" id="btn-do-register">
                        创建账号 <i class="bi bi-check2-circle fs-5 align-middle"></i>
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="l.js"></script>
</body>
</html>
