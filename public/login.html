<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMEBANK | AUTH_NODE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="l.css"> 
</head>
<body class="d-flex align-items-center justify-content-center py-5" style="min-height: 100vh; position: relative;">

    <button class="btn btn-brut position-absolute top-0 end-0 m-4 px-3" id="btn-theme-toggle" title="TOGGLE THEME" style="z-index: 1050;">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <div class="brut-card p-4 p-md-5 my-auto" style="width: 100%; max-width: 520px; position: relative; z-index: 10;" id="auth-card">
        
        <div class="mb-4 border-bottom pb-3" style="border-bottom: 4px solid var(--brut-black) !important;">
            <span class="badge-brut mb-2 d-inline-block" id="sys-badge">SYS.TIMEBANK</span>
            <h2 class="fw-black m-0 font-monospace" style="letter-spacing: -1px;" id="main-title">AUTHENTICATION</h2>
            <p class="font-monospace small fw-bold mt-2 mb-0" style="color: var(--brut-red);">// 让每一次志愿服务都有迹可循</p>
        </div>

        <ul class="nav nav-pills nav-justified mb-4" id="loginTabs" role="tablist">
            <li class="nav-item pe-2" role="presentation">
                <button class="nav-link active w-100" id="tab-login" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">LOGIN // 登录</button>
            </li>
            <li class="nav-item ps-2" role="presentation" id="tab-register-wrapper">
                <button class="nav-link w-100" id="tab-register" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">REGISTER // 注册</button>
            </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
            
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label font-monospace fw-bold small">USER_ID [邮箱地址]</label>
                        <input type="email" class="form-control brut-input" id="login-email" placeholder="INPUT EMAIL..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-monospace fw-bold small">ACCESS_KEY [登录密码]</label>
                        <div class="position-relative">
                            <input type="password" class="form-control brut-input pe-5" id="login-password" placeholder="INPUT PASSWORD..." required>
                            <i class="bi bi-eye-slash-fill position-absolute top-50 end-0 translate-middle-y me-3 pwd-toggle" style="cursor: pointer; color: var(--brut-black);" data-target="login-password"></i>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input rounded-0 border-dark" type="checkbox" id="login-remember">
                            <label class="form-check-label font-monospace small fw-bold" for="login-remember">REMEMBER_ME</label>
                        </div>
                        <a href="#" class="font-monospace small fw-bold text-danger text-decoration-none" id="btn-forgot-pwd">FORGOT_PWD?</a>
                    </div>
                    
                    <button type="button" class="btn btn-brut btn-brut-red w-100 py-2 fs-5" id="btn-do-login">
                        EXECUTE LOGIN <i class="bi bi-caret-right-fill"></i>
                    </button>
                </form>
            </div>

            <div class="tab-pane fade" id="pills-register" role="tabpanel">
                <form id="register-form">
                    
                    <div class="mb-3">
                        <label class="form-label font-monospace fw-bold small">SYS_ROLE [选择身份]</label>
                        <select class="form-select brut-input" id="reg-role">
                            <option value="student" selected>STUDENT (学生)</option>
                            <option value="teacher">TEACHER (老师)</option>
                            <option value="admin">ADMIN (审核员)</option>
                        </select>
                    </div>

                    <span class="badge-brut mb-3 bg-dark text-white border-white w-100">GLOBAL_IDENTITY [全局实名档案]</span>
                    <div class="row g-2 mb-3">
                        <div class="col-md-6 mb-2">
                            <label class="form-label font-monospace fw-bold small mb-1">REAL_NAME [真实姓名]*</label>
                            <input type="text" class="form-control brut-input form-control-sm" id="reg-name" placeholder="张三" required>
                        </div>
                        <div class="col-md-6 mb-2">
                            <label class="form-label font-monospace fw-bold small mb-1">ENG_NAME [英文名] (可选)</label>
                            <input type="text" class="form-control brut-input form-control-sm" id="reg-ename" placeholder="Arthur (Optional)">
                        </div>
                        <div class="col-12 mb-1">
                            <label class="form-label font-monospace fw-bold small mb-1">USERNAME [系统昵称]*</label>
                            <input type="text" class="form-control brut-input form-control-sm" id="reg-username" placeholder="HackMIT_Player" required>
                        </div>
                    </div>

                    <div id="student-fields-wrapper" class="bg-light p-3 border border-dark border-2 mb-3">
                        <span class="badge-brut mb-3 bg-white text-dark w-100">STUDENT_EXTRA [学生附加信息]</span>
                        <div class="row g-2">
                            <div class="col-12 mb-2">
                                <label class="form-label font-monospace fw-bold small mb-1">SCHOOL_NAME [所在学校]*</label>
                                <input type="text" class="form-control brut-input form-control-sm" id="reg-school" placeholder="Polaris High School">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label font-monospace fw-bold small mb-1">STUDENT_ID [学号]*</label>
                                <input type="text" class="form-control brut-input form-control-sm" id="reg-studentid" placeholder="唯一校验">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label font-monospace fw-bold small mb-1">CLASS [班级]*</label>
                                <input type="text" class="form-control brut-input form-control-sm" id="reg-class" placeholder="Grade 10">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label font-monospace fw-bold small">NEW_USER_ID [邮箱地址] *</label>
                        <input type="email" class="form-control brut-input" id="reg-email" placeholder="SCHOOL EMAIL RECOMMENDED" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label font-monospace fw-bold small">VERIFY_CODE [邮箱验证码] *</label>
                        <div class="d-flex gap-2">
                            <input type="text" class="form-control brut-input" id="reg-code" placeholder="6-DIGIT CODE" required>
                            <button type="button" class="btn btn-brut px-3 font-monospace fw-bold" id="btn-get-code" style="white-space: nowrap; width: 140px;">GET CODE</button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label font-monospace fw-bold small">SET_ACCESS_KEY [设置密码] *</label>
                        <div class="position-relative">
                            <input type="password" class="form-control brut-input pe-5" id="reg-password" placeholder="建议大小写+数字+符号" required>
                            <i class="bi bi-eye-slash-fill position-absolute top-50 end-0 translate-middle-y me-3 pwd-toggle" style="cursor: pointer; color: var(--brut-black);" data-target="reg-password"></i>
                        </div>
                        <div class="d-flex align-items-center mt-2">
                            <div class="progress flex-grow-1" style="height: 6px; border-radius: 0; background: var(--brut-black); border: 1px solid var(--brut-black);">
                                <div id="pwd-strength-bar" class="progress-bar" role="progressbar" style="width: 0%; transition: width 0.3s ease, background-color 0.3s ease;"></div>
                            </div>
                            <span class="font-monospace small fw-bold ms-2" id="pwd-strength-text" style="width: 70px; text-align: right;">NONE</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label font-monospace fw-bold small">CONFIRM_KEY [确认密码] *</label>
                        <div class="position-relative">
                            <input type="password" class="form-control brut-input pe-5" id="reg-password-confirm" placeholder="RE-ENTER PASSWORD" required>
                            <i class="bi bi-eye-slash-fill position-absolute top-50 end-0 translate-middle-y me-3 pwd-toggle" style="cursor: pointer; color: var(--brut-black);" data-target="reg-password-confirm"></i>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label font-monospace fw-bold small text-danger" id="invite-code-label">INVITE_CODE [学生邀请码] *</label>
                        <input type="text" class="form-control brut-input border-danger" id="reg-invite-code" placeholder="SYSTEM INVITE REQUIRED" required>
                    </div>

                    <div class="p-3 mb-4 bg-dark text-white border border-dark border-2 font-monospace small">
                        <div class="form-check m-0 d-flex align-items-center">
                            <input class="form-check-input rounded-0 border-white mt-0 me-2" type="checkbox" id="reg-integrity" style="width: 1.5em; height: 1.5em;" required>
                            <label class="form-check-label" for="reg-integrity">
                                I AGREE TO THE <a href="#" class="text-danger fw-bold">PRIVACY POLICY</a> & COMMIT TO ACADEMIC INTEGRITY. (同意协议并承诺学术诚信)
                            </label>
                        </div>
                    </div>

                    <button type="button" class="btn btn-brut w-100 py-3 fs-5" id="btn-do-register" style="background-color: var(--brut-black); color: var(--brut-white);">
                        CREATE NODE <i class="bi bi-plus-square-fill ms-2"></i>
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="l.js"></script>
</body>
</html>
