<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简沙漏 - 修复版深色强烈磨砂材质</title>
    <style>
        /* --- 1. 页面背景 --- */
        body {
            background-color: #f7f7f9; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* --- 2. 深色物理磨砂卡片 --- */
        .matte-container {
            position: relative;
            padding: 50px 70px;
            border-radius: 20px;
            background: linear-gradient(145deg, #2a2a2e, #1e1e21);
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.2),
                        -5px -5px 15px rgba(255, 255, 255, 0.05); 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            overflow: hidden; 
        }

        /* 修复后的磨砂噪点层 */
        .matte-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* SVG 噪点生成 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            
            /* 关键修复 1：提高透明度让颗粒显现 */
            opacity: 0.15; 
            
            /* 关键修复 2：将 multiply 改为 overlay。这会让暗部变暗，亮部（白色噪点）变亮，在深色背景上极其明显 */
            mix-blend-mode: overlay; 
            
            pointer-events: none; 
            z-index: 0;
        }

        /* 确保内容在磨砂层之上 */
        .loader, .loading-text {
            position: relative;
            z-index: 1;
        }

        /* --- 3. 沙漏与文字动画 --- */
        .loader {
            width: 100px;
            height: 130px;
        }

        .loader-svg {
            width: 100%;
            height: 100%;
            transform-origin: center center;
            animation: flip 7s cubic-bezier(0.68, -0.6, 0.32, 1.6) infinite;
        }

        .outline-path {
            fill: none;
            stroke: #ffb300; 
            stroke-width: 2.5; 
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 400; 
            stroke-dashoffset: 400; 
            animation: draw 7s ease-in-out infinite;
            filter: drop-shadow(0 0 5px rgba(255, 179, 0, 0.6));
        }

        .sand-fill { fill: #ffb300; }

        .sand-bottom {
            animation: accumulate-and-vanish 7s ease-out infinite;
            transform-origin: bottom center; 
        }

        .loading-text {
            font-size: 1.1em;
            letter-spacing: 0.1em;
            font-weight: bold; 
            margin-top: -10px; 
            animation: breathe-dark-bg 3s ease-in-out infinite;
        }

        @keyframes draw {
            0%, 5% { stroke-dashoffset: 400; } 
            25%, 80% { stroke-dashoffset: 0; }  
            95%, 100% { stroke-dashoffset: 400; } 
        }

        @keyframes flip {
            0%, 85% { transform: rotate(0deg); } 
            92%, 100% { transform: rotate(180deg); } 
        }

        @keyframes accumulate-and-vanish {
            0%, 10% { transform: translateY(55px); opacity: 0; filter: blur(0); }
            40% { transform: translateY(0); opacity: 0.85; filter: blur(0); } 
            50% { transform: translateY(0); opacity: 0.85; filter: blur(0); }
            65% { transform: translateY(0); opacity: 0; filter: blur(10px); } 
            100% { transform: translateY(0); opacity: 0; filter: blur(10px); } 
        }

        @keyframes breathe-dark-bg {
            0%, 100% {
                color: #888888; 
                text-shadow: none; 
                transform: scale(0.98); 
            }
            50% {
                color: #ffb300; 
                text-shadow: 0 0 8px rgba(255, 179, 0, 0.4); 
                transform: scale(1.02); 
            }
        }
    </style>
</head>
<body>

    <div class="matte-container">
        <div class="loader">
            <svg viewBox="0 0 100 130" class="loader-svg">
                <defs>
                    <clipPath id="mask-curve">
                        <path d="M 25,15 L 75,15 C 75,45 60,55 55,65 C 60,75 75,85 75,115 L 25,115 C 25,85 40,75 45,65 C 40,55 25,45 25,15 Z" />
                    </clipPath>
                </defs>
                
                <path class="outline-path" d="M 25,15 L 75,15 C 75,45 60,55 55,65 C 60,75 75,85 75,115 L 25,115 C 25,85 40,75 45,65 C 40,55 25,45 25,15 Z" />
                
                <g clip-path="url(#mask-curve)">
                    <rect class="sand-fill sand-bottom" x="0" y="60" width="100" height="55" />
                </g>
            </svg>
        </div>
        <div class="loading-text">Minting Time...</div>
    </div>

</body>
</html>
